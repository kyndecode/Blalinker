# BLA — Configuration Nginx production

upstream backend { server backend:3000; }

server {
    listen 80;
    server_name blalinker.com www.blalinker.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name blalinker.com www.blalinker.com;

    ssl_certificate     /etc/letsencrypt/live/blalinker.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blalinker.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Sécurité headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           DENY always;
    add_header X-Content-Type-Options    nosniff always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain application/json application/javascript text/css application/xml;
    gzip_comp_level 6;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    root /usr/share/nginx/html;
    index index.html;

    # Frontend statique
    location / {
        try_files $uri $uri/ /index.html;
        expires   1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Assets statiques avec cache long
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
    }

    # API backend
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # Auth (rate limit strict)
    location /api/v1/auth {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # WebSocket
    location /socket.io/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }
}
