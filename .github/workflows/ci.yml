##############################################################
# BLA — Pipeline CI/CD GitHub Actions
# Déclencheurs : push sur main/develop + PR sur main
##############################################################

name: BLA CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  GHCR_IMAGE_PREFIX: ghcr.io/j-y-kpangban/blaservices

jobs:

  # ────────────────────────────────────────────────────────
  #  Tests Backend
  # ────────────────────────────────────────────────────────
  test-backend:
    name: Tests Backend (Node.js + PostgreSQL)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_DB:       bla_test
          POSTGRES_USER:     bla_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Installer les dépendances
        run: cd backend && npm ci

      - name: Générer le client Prisma
        run: cd backend && npx prisma generate

      - name: Initialiser les extensions PostgreSQL
        run: |
          PGPASSWORD=test_password psql -h localhost -U bla_user -d bla_test -c "
            CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";
            CREATE EXTENSION IF NOT EXISTS postgis;
            CREATE EXTENSION IF NOT EXISTS pg_trgm;
            CREATE EXTENSION IF NOT EXISTS pgcrypto;
          "

      - name: Appliquer les migrations
        run: cd backend && npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://bla_user:test_password@localhost:5432/bla_test

      - name: Linting
        run: cd backend && npm run lint

      - name: Tests avec couverture
        run: cd backend && npm run test:coverage
        env:
          NODE_ENV:           test
          DATABASE_URL:       postgresql://bla_user:test_password@localhost:5432/bla_test
          REDIS_URL:          redis://localhost:6379
          JWT_PRIVATE_KEY:    ${{ secrets.JWT_PRIVATE_KEY_TEST }}
          JWT_PUBLIC_KEY:     ${{ secrets.JWT_PUBLIC_KEY_TEST }}
          ENCRYPTION_KEY:     ${{ secrets.ENCRYPTION_KEY_TEST }}
          PORT:               3000
          APP_URL:            http://localhost:3000
          CORS_ORIGIN:        http://localhost:5173

      - name: Upload couverture vers Codecov
        uses: codecov/codecov-action@v4
        with:
          token:  ${{ secrets.CODECOV_TOKEN }}
          flags:  backend
          directory: ./backend/coverage

  # ────────────────────────────────────────────────────────
  #  Tests Frontend Web
  # ────────────────────────────────────────────────────────
  test-frontend:
    name: Tests Frontend Web (Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend-web/package-lock.json

      - name: Installer les dépendances
        run: cd frontend-web && npm ci

      - name: Linting
        run: cd frontend-web && npm run lint

      - name: Tests avec couverture
        run: cd frontend-web && npm run test:coverage

      - name: Build de production
        run: cd frontend-web && npm run build
        env:
          VITE_API_URL: https://api.bla-app.com/api/v1

  # ────────────────────────────────────────────────────────
  #  Audit de sécurité
  # ────────────────────────────────────────────────────────
  security-audit:
    name: Audit sécurité
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit dépendances backend (vulnerabilités high+)
        run: |
          cd backend
          npm ci
          npm audit --audit-level=high

      - name: Audit dépendances frontend
        run: |
          cd frontend-web
          npm ci
          npm audit --audit-level=high

      - name: Semgrep — analyse statique de sécurité
        uses: returntocorp/semgrep-action@v1
        continue-on-error: true
        with:
          config: >-
            p/nodejs
            p/jwt
            p/sql-injection
            p/xss
            p/secrets

  # ────────────────────────────────────────────────────────
  #  Build Docker images
  # ────────────────────────────────────────────────────────
  build-docker:
    name: Build images Docker
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, security-audit]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion à GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Extraire les métadonnées (tags)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE_PREFIX }}/backend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}

      - name: Build + Push image backend
        uses: docker/build-push-action@v5
        with:
          context:   ./backend
          target:    production
          push:      true
          tags:      ${{ steps.meta-backend.outputs.tags }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build + Push image frontend
        uses: docker/build-push-action@v5
        with:
          context:   ./frontend-web
          target:    production
          push:      true
          tags:      ${{ env.GHCR_IMAGE_PREFIX }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: |
            VITE_API_URL=/api/v1

  # ────────────────────────────────────────────────────────
  #  Déploiement — Staging (develop)
  # ────────────────────────────────────────────────────────
  deploy-staging:
    name: Déployer sur Staging
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.ref == 'refs/heads/develop' && secrets.STAGING_HOST != '' && secrets.STAGING_USER != '' && secrets.STAGING_SSH_KEY != ''
    environment:
      name: staging
      url:  https://staging.bla-app.com

    steps:
      - uses: actions/checkout@v4

      - name: Déployer sur le serveur Staging
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key:      ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/bla

            echo "📦 Pulling images..."
            echo "${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.repository_owner }}" --password-stdin
            docker pull ${{ env.GHCR_IMAGE_PREFIX }}/backend:develop
            docker pull ${{ env.GHCR_IMAGE_PREFIX }}/frontend:${{ github.sha }}

            echo "🔄 Redémarrage des services..."
            docker compose -f docker-compose.prod.yml up -d --no-deps backend frontend

            echo "📊 Migration DB..."
            docker compose -f docker-compose.prod.yml exec -T backend \
              npx prisma migrate deploy

            echo "✅ Déploiement staging terminé !"

      - name: Notification Slack (staging)
        if: always() && secrets.SLACK_WEBHOOK != ''
        uses: 8398a7/action-slack@v3
        with:
          status:      ${{ job.status }}
          text:        "Déploiement Staging BLA — ${{ github.sha }}"
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  # ────────────────────────────────────────────────────────
  #  Déploiement — Production (main, approbation requise)
  # ────────────────────────────────────────────────────────
  deploy-production:
    name: Déployer en Production
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.ref == 'refs/heads/main' && secrets.PROD_HOST != '' && secrets.PROD_USER != '' && secrets.PROD_SSH_KEY != ''
    environment:
      name: production
      url:  https://bla-app.com

    steps:
      - uses: actions/checkout@v4

      - name: Déployer en production (blue-green)
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key:      ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /opt/bla

            echo "📦 Pulling images production..."
            echo "${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.repository_owner }}" --password-stdin
            docker pull ${{ env.GHCR_IMAGE_PREFIX }}/backend:main
            docker pull ${{ env.GHCR_IMAGE_PREFIX }}/frontend:${{ github.sha }}

            echo "🔄 Démarrage du nouveau backend (sans downtime)..."
            docker compose -f docker-compose.prod.yml up -d --no-deps --scale backend=2 backend

            echo "📊 Migration DB..."
            docker compose -f docker-compose.prod.yml exec -T backend \
              npx prisma migrate deploy

            echo "🔄 Mise à jour frontend..."
            docker compose -f docker-compose.prod.yml up -d --no-deps frontend

            echo "🧹 Nettoyage anciennes images..."
            docker image prune -f --filter "until=48h"

            echo "✅ Déploiement production terminé — version ${{ github.sha }}"

      - name: Notification Slack (production)
        if: always() && secrets.SLACK_WEBHOOK != ''
        uses: 8398a7/action-slack@v3
        with:
          status:      ${{ job.status }}
          text:        "🚀 Déploiement Production BLA v${{ github.sha }}"
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
