##############################################################
# BLA — Render Blueprint (backend API uniquement)
# DB  : Supabase (PostgreSQL)        → variable DATABASE_URL
# Cache: Upstash (Redis)             → variable REDIS_URL
# Frontends : Vercel (web + admin)   → hors de ce blueprint
# Doc : https://render.com/docs/blueprint-spec
##############################################################

services:

  # ──────────────────────────────────────────────────────────
  #  Backend API — Node.js  → domaine cible : api.blalinker.com
  # ──────────────────────────────────────────────────────────
  - type: web
    name: bla-backend
    runtime: node
    region: frankfurt          # proche Afrique de l'Ouest
    plan: free                 # passer à un plan payant pour éviter le spin-down
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    # migrate deploy nécessite une connexion "Session pooler" Supabase (voir DATABASE_URL)
    startCommand: npx prisma migrate deploy && node dist/server.js
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

      # URL publique du SITE (utilisée pour les liens et les pages de retour paiement)
      - key: APP_URL
        value: https://www.blalinker.com

      # Origines autorisées (CORS). Ajouter les URLs *.vercel.app de preview si besoin.
      - key: CORS_ORIGIN
        value: https://www.blalinker.com,https://blalinker.com,https://admin.blalinker.com

      # ─── Base de données — Supabase (Session pooler, port 5432, IPv4) ───
      #   Format : postgresql://postgres.<ref>:<password>@aws-0-<region>.pooler.supabase.com:5432/postgres?sslmode=require
      - key: DATABASE_URL
        sync: false

      # ─── Redis — Upstash (rediss://) ───
      - key: REDIS_URL
        sync: false

      # ─── Secrets à REGÉNÉRER (les anciens ont été exposés) ───
      - key: JWT_PRIVATE_KEY
        sync: false
      - key: JWT_PUBLIC_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 30d

      # Compte admin (mot de passe fort, jamais commité)
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

      # Email transactionnel — Brevo
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_FROM_EMAIL
        value: noreply@blalinker.com
      - key: BREVO_FROM_NAME
        value: BLA Services

      # SMS OTP — Twilio (optionnel)
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false

      # Stockage fichiers — Cloudinary (optionnel)
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # Paiements — CinetPay (Wave, Orange Money, MTN…)
      - key: CINETPAY_API_KEY
        sync: false
      - key: CINETPAY_SITE_ID
        sync: false
      - key: CINETPAY_SECRET_KEY        # vérification HMAC x-token des webhooks
        sync: false
      - key: CINETPAY_NOTIFY_URL
        value: https://api.blalinker.com/api/v1/payments/webhook/cinetpay
      - key: CINETPAY_RETURN_URL
        value: https://www.blalinker.com/payment/success

      # Paiements — Stripe (cartes internationales)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PUBLIC_KEY
        sync: false

      # Auth sociale
      - key: GOOGLE_CLIENT_ID
        sync: false

      # Monitoring (optionnel)
      - key: SENTRY_DSN
        sync: false
