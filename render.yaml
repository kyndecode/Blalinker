##############################################################
# BLA — Render Blueprint (Infrastructure as Code)
# Déploie automatiquement tous les services sur render.com
# Doc : https://render.com/docs/blueprint-spec
##############################################################

services:

  # ──────────────────────────────────────────────────────────
  #  Backend API — Node.js
  # ──────────────────────────────────────────────────────────
  - type: web
    name: bla-backend
    runtime: node
    region: frankfurt   # Plus proche Afrique de l'Ouest que US
    plan: free          # Gratuit (512MB RAM, spin-down après 15min inactivité)
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/server.js
    healthCheckPath: /health
    autoDeploy: true    # Re-déploie à chaque push sur main

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: APP_URL
        fromService:
          name: bla-backend
          type: web
          property: host
      - key: CORS_ORIGIN
        value: https://bla-app.onrender.com,https://bla-admin.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: bla-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: bla-redis
          type: redis
          property: connectionString

      # Secrets (à renseigner dans le dashboard Render)
      - key: JWT_PRIVATE_KEY
        sync: false
      - key: JWT_PUBLIC_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 30d

      # Brevo (email transactionnel)
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_FROM_EMAIL
        value: noreply@bla-app.com
      - key: BREVO_FROM_NAME
        value: BLA Services

      # Twilio SMS OTP
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false

      # Cloudinary
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # Paiements
      - key: WAVE_API_KEY
        sync: false
      - key: WAVE_WEBHOOK_SECRET
        sync: false
      - key: ORANGE_MONEY_CLIENT_ID
        sync: false
      - key: ORANGE_MONEY_CLIENT_SECRET
        sync: false
      - key: ORANGE_MERCHANT_KEY
        sync: false

      # Sentry
      - key: SENTRY_DSN
        sync: false

  # ──────────────────────────────────────────────────────────
  #  Frontend Web — React (site statique)
  # ──────────────────────────────────────────────────────────
  - type: web
    name: bla-app
    runtime: static
    rootDir: frontend-web
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true

    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

    routes:
      # SPA routing — tout renvoie vers index.html
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: VITE_API_URL
        fromService:
          name: bla-backend
          type: web
          property: host
      - key: VITE_WS_URL
        fromService:
          name: bla-backend
          type: web
          property: host

  # ──────────────────────────────────────────────────────────
  #  Admin Dashboard — React (site statique SÉPARÉ)
  # ──────────────────────────────────────────────────────────
  - type: web
    name: bla-admin
    runtime: static
    rootDir: frontend-admin
    buildCommand: npm ci && npm run build
    staticPublishPath: dist

    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Robots-Tag
        value: noindex, nofollow
      - path: /*
        name: Referrer-Policy
        value: same-origin
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: VITE_API_URL
        fromService:
          name: bla-backend
          type: web
          property: host

  # ──────────────────────────────────────────────────────────
  #  Redis — Cache & Sessions
  # ──────────────────────────────────────────────────────────
  - type: redis
    name: bla-redis
    region: frankfurt
    plan: free          # 25MB RAM — suffisant pour démarrer
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []     # Accessible uniquement depuis Render

# ──────────────────────────────────────────────────────────
#  PostgreSQL — Base de données principale
# ──────────────────────────────────────────────────────────
databases:
  - name: bla-postgres
    region: frankfurt
    plan: free          # 256MB, 1GB stockage — suffisant pour dev/staging
    databaseName: bla_db
    user: bla_user
    postgresMajorVersion: 15
